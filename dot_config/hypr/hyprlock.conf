general {
    hide_cursor = true
    immediate_render = true          # КЛЮЧЕВОЙ ПАРАМЕТР — убирает чёрный экран
    disable_loading_bar = true
}

background {
    monitor = HDMI-A-1
    path = /path/to/your/wallpaper   # Укажите реальный путь к картинке, либо закомментируйте
    # color = rgba(25, 20, 20, 1.0)  # Если нет картинки, раскомментируйте цвет
    blur_passes = 0                   # 0 = нет размытия
}

input-field {
    monitor = HDMI-A-1
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = false
    outer_color = rgb(151515)
    inner_color = rgb(200,200,200)
    font_color = rgb(10,10,10)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = -1
    check_color = rgb(204,136,34)
    fail_color = rgb(204,34,34)
    fail_text = <i>Wrong!</i>
    fail_transition = 300
    position = 0, -80
    halign = center
    valign = center
}
