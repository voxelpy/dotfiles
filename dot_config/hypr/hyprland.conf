# #######################################################################################
# HYPRLAND CONFIG (SMOOTH + CLEAN + POLISHED)
# #######################################################################################
#env = HYPRLAND_NO_START_HYPRLAND_WARNING,1
################
### MONITORS ###
################

#monitor = HDMI-A-1, highrr, 0x0, 1
monitor=HDMI-A-1,1920x1080@144,0x0,1
###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$browser = chromium

#################
### AUTOSTART ###
#################





exec-once = swaync


# exec-once = ~/.local/bin/random-wallpaper.sh
# exec-once = ~/.config/hypr/wallpaper-changer.sh
# exec-once = waypaper --restore
exec-once = swayosd
exec-once = swayosd-server
exec-once = swayosd-libinput-backend
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets
exec-once = waypaper --restore
#exec-once = hyprpanel
exec-once = waybar
exec-once = AmneziaVPN


exec-once = antimicrox --hidden --profile /home/ivan/Documents/cofig.gamecontroller.amgp
exec-once = sh -c "sleep 2 && spotify"
exec-once = sh -c "sleep 2 && discord"
#exec-once = sh -c "sleep 2 && chromium"
exec-once = sh -c "sleep 2 && firefox"
#exec-once = sh -c "sleep 3 && kitty --hold cava"
#exec-once = sh -c "sleep 3 && kitty --hold fastfetch"

#exec-once = [workspace 2 silent] kitty peaclock
#exec-once = [workspace 2 silent] happ
exec-once = [workspace 2 silent] steam
exec-once = awww --format xrgb

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################



general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    col.active_border = rgba(5ec8ffcc) rgba(7ef7c9cc) 45deg
    col.inactive_border = rgba(444444aa)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 14
    rounding_power = 3

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 10
        render_power = 4
        color = rgba(000000aa)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.2
        noise = 0.01
    }
}

###################
### ANIMATIONS ###
###################

animations {
    enabled = yes

    bezier = smooth,0.25,0.1,0.25,1
    bezier = snappy,0.2,0.8,0.2,1

    animation = global, 1, 8, smooth
    animation = border, 1, 6, smooth

    animation = windows, 1, 5, smooth, slide
    animation = windowsIn, 1, 4, smooth, popin 80%
    animation = windowsOut, 1, 2, smooth, popin 80%

    animation = fadeIn, 1, 2, smooth
    animation = fadeOut, 1, 2, smooth
    animation = fade, 1, 3, smooth

    animation = layers, 1, 4, smooth
    animation = layersIn, 1, 4, smooth, fade
    animation = layersOut, 1, 2, smooth, fade

    animation = workspaces, 1, 2.5, smooth, slidefade
}

################
### LAYOUTS ###
################

dwindle {
    
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
    vrr = 1
}

#############
### INPUT ###
#############

input {
    kb_layout = us,ru
    kb_options = grp:alt_space_toggle

    follow_mouse = 1
    sensitivity = -0.05

    touchpad {
        natural_scroll = true
    }

    #scroll_method = on_button_down
    #scroll_button = 274
    #scroll_button_lock = true
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

source = ~/.config/hypr/keybind.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrulev3 = suppressevent maximize, class:.*
windowrulev3 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

###################
### SCREENSHOTS ###
###################

bind = SUPER, S, exec, grim -g "$(slurp)" ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = SUPER SHIFT, S, exec, grim ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = SUPER CTRL, S, exec, grim -g "$(slurp)" - | wl-copy

###################
### EXTRA BINDS ###
###################

bind = SUPER, F, fullscreen, 0
bind = ALT, W, exec, waypaper

bind = ALT, Q, exec, echo 'cycle pause' | socat - /tmp/mpv-video.sock
bind = $mainMod, A, exec, ~/.config/hypr/scripts/audio_sink_wofi.sh
bindr = SUPER, Super_L, exec, swaync-client -t -sw
bind = CTRL ALT, F, togglefloating
bind = SUPER, X, exec, kitty -e nvim ~/.config/hypr/hyprland.conf

# Запуск Hydra Launcher
bind = CTRL ALT, H, exec, ELECTRON_ENABLE_LOGGING=1 ELECTRON_DEBUG_ALWAYS=1 /usr/bin/hydralauncher --no-sandbox
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# ... остальные настройки
env = GDK_DPI_SCALE,1.2
env = QT_SCALE_FACTOR,1.2

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

